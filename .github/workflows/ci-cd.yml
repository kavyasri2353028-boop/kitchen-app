name: CI-CD

on:
  push:
    branches:
      - main
      - student/**
  pull_request:

jobs:
  test-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test

  build-images:
    runs-on: ubuntu-latest
    needs: test-api
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t kitchen-api:ci ./api --target production
      - name: Build web UI image
        run: docker build -t kitchen-web:ci ./web-ui

  kubernetes-smoke:
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - uses: actions/checkout@v4
      - uses: helm/kind-action@v1.10.0
        with:
          cluster_name: kitchen-cluster
      - name: Build and load images
        run: |
          docker build -t kitchen-api:local ./api --target production
          docker build -t kitchen-web:local ./web-ui
          kind load docker-image kitchen-api:local --name kitchen-cluster
          kind load docker-image kitchen-web:local --name kitchen-cluster
      - name: Apply manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl create configmap api-config --from-literal=PORT=3000 --namespace kitchen-app --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic mongodb-secret --from-literal=mongo-root-username=admin --from-literal=mongo-root-password=Secret123! --from-literal=mongo-uri='mongodb://admin:Secret123!@mongodb-service.kitchen-app.svc.cluster.local:27017/kitchendb?authSource=admin' --namespace kitchen-app --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f k8s/db/statefulset.yaml
          kubectl rollout status statefulset/mongodb -n kitchen-app --timeout=180s
          kubectl apply -f k8s/api/deployment.yaml
          kubectl rollout status deployment/api-deployment -n kitchen-app --timeout=180s
          kubectl apply -f k8s/web-ui/deployment.yaml
          kubectl rollout status deployment/web-ui-deployment -n kitchen-app --timeout=120s
          kubectl apply -f k8s/monitoring/prometheus-config.yaml
          kubectl rollout status deployment/prometheus-deployment -n kitchen-app --timeout=120s
          kubectl apply -f k8s/monitoring/grafana-dashboard.yaml
          kubectl apply -f k8s/monitoring/grafana-deployment.yaml
          kubectl rollout status deployment/grafana-deployment -n kitchen-app --timeout=120s
      - name: Smoke checks
        run: |
          kubectl get pods -n kitchen-app
          kubectl get svc -n kitchen-app
          kubectl port-forward -n kitchen-app svc/api 3000:3000 >/tmp/api.log 2>&1 &
          kubectl port-forward -n kitchen-app svc/web-ui-service 8080:80 >/tmp/web.log 2>&1 &
          sleep 15
          curl -fsS http://127.0.0.1:3000/health
          curl -fsS -X POST http://127.0.0.1:3000/orders -H 'Content-Type: application/json' -d '{"dish":"CI Validation Meal"}'
          curl -fsS http://127.0.0.1:3000/orders
          curl -fsS -o /dev/null -w '%{http_code}' http://127.0.0.1:8080
